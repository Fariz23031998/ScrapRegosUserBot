# Standalone config for no-thing.uz
# This will NOT affect your existing docvision.uz configuration

# HTTP block - redirects to HTTPS
server {
    if ($host = www.no-thing.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = no-thing.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name no-thing.uz www.no-thing.uz;
    return 301 https://$host$request_uri;
}

# HTTPS block for no-thing.uz - Regos Partner Bot
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name no-thing.uz www.no-thing.uz;
    
    # Allow large uploads (fixes 413 error)
    client_max_body_size 50M;

    # Telegram WebApp - handle with and without trailing slash
    location = /mini-app {
        return 301 /mini-app/;
    }

    # Regos Partner Bot - Telegram WebApp
    location /mini-app/ {
        alias /srv/RegosPartnerBotNew/telegram-webapp/dist/;
        index index.html;
        try_files $uri $uri/ /mini-app/index.html;
        
        # Security headers
        # Good security headers that won't interfere with Telegram
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
	    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Your working CSP for frame embedding
        add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://webk.telegram.org https://webz.telegram.org https://*.telegram.org" always;        
    }

    # Admin panel - handle with and without trailing slash
    location = /admin {
        return 301 /admin/;
    }

    # Regos Partner Bot - Admin Panel
    location /admin/ {
        alias /srv/RegosPartnerBotNew/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # DocVision Admin Panel - handle with and without trailing slash
    location = /admin-docvision {
        return 301 /admin-docvision/;
    }

    # DocVision Admin Panel
    location /admin-docvision/ {
        alias /srv/docvision-full-stack/admin-panel/dist/;  
        index index.html;
        try_files $uri $uri/ /admin-docvision/index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Regos Partner Bot - API
    location /api {
        proxy_pass http://127.0.0.1:8001/api;
        proxy_http_version 1.1;

        # CRITICAL: Forward Authorization header
        proxy_pass_request_headers on;
        proxy_set_header Authorization $http_authorization;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # X-Script-Name removed - not needed without root_path

        proxy_set_header Access-Control-Request-Method $request_method;
        proxy_set_header Access-Control-Request-Headers $http_access_control_request_headers;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location /regos/webhook {
        proxy_pass http://127.0.0.1:8001/regos/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ScrapRegosUserBot — payment server (port 3000)
    # /api/orders/ is longer than /api, so Regos Partner Bot API on :8001 is untouched

    location /api/orders/ {
        proxy_pass http://127.0.0.1:3000/api/orders/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /click/ {
        proxy_pass http://127.0.0.1:3000/click/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /bot-admin/ {
        proxy_pass http://127.0.0.1:3000/bot-admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /pay {
        proxy_pass http://127.0.0.1:3000/pay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /brand-logo.png {
        proxy_pass http://127.0.0.1:3000/brand-logo.png;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /css/payment.css {
        proxy_pass http://127.0.0.1:3000/css/payment.css;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /js/payment.js {
        proxy_pass http://127.0.0.1:3000/js/payment.js;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payment page: https://no-thing.uz/{order-uuid}
    location ~ "^/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$" {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root - simple message or redirect
    location / {
        return 200 "Regos Partner Bot - Use /admin or /mini-app";
        add_header Content-Type text/plain;
    }
    ssl_certificate /etc/letsencrypt/live/no-thing.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/no-thing.uz/privkey.pem;
}
