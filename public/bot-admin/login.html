<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — Bot Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/bot-admin/login.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="bg-orb bg-orb--1"></div>
      <div class="bg-orb bg-orb--2"></div>
      <div class="bg-grid"></div>
    </div>

    <main class="login-shell">
      <section class="login-card">
        <div class="login-brand">
          <div class="login-logo" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path
                d="M12 2L4 6v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V6l-8-4z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <div>
            <p class="login-eyebrow">ScrapRegos</p>
            <h1>Панель управления</h1>
            <p class="login-subtitle">Сотрудники, права и доступ к Telegram-боту</p>
          </div>
        </div>

        <form id="login-form" class="login-form" autocomplete="on">
          <label class="field">
            <span>Логин</span>
            <input
              type="text"
              name="login"
              required
              autocomplete="username"
              placeholder="admin"
            />
          </label>

          <label class="field">
            <span>Пароль</span>
            <div class="password-wrap">
              <input
                type="password"
                name="password"
                required
                autocomplete="current-password"
                placeholder="••••••••"
              />
              <button type="button" class="toggle-password" id="toggle-password" aria-label="Показать пароль">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5" />
                </svg>
              </button>
            </div>
          </label>

          <p id="login-error" class="login-error" hidden></p>

          <button type="submit" class="login-submit" id="login-submit">
            <span>Войти</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M5 12h14M13 6l6 6-6 6"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </form>
      </section>

      <p class="login-footer">Доступ только для администраторов</p>
    </main>

    <script src="/bot-admin/login.js"></script>
  </body>
</html>
