<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Управление пользователями бота</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="header-top">
          <div>
            <h1>Пользователи Telegram-бота</h1>
            <p>Сотрудники: добавьте телефон и права. Клиенты регистрируются автоматически при привязке номера в боте.</p>
          </div>
          <button type="button" class="btn btn-secondary" id="logout-btn">Выйти</button>
        </div>
        <nav class="admin-nav" aria-label="Разделы админ-панели">
          <a class="admin-nav__link admin-nav__link--active" href="/bot-admin/" aria-current="page">Пользователи</a>
          <a class="admin-nav__link" href="/bot-admin/order-logs">Журнал заказов</a>
        </nav>
      </header>

      <section class="card">
        <div class="card-toolbar">
          <div class="card-toolbar-left">
            <h2>Пользователи</h2>
            <div class="role-tabs" role="tablist">
              <button type="button" class="role-tab role-tab--active" data-role="employee" role="tab" aria-selected="true">Сотрудники</button>
              <button type="button" class="role-tab" data-role="customer" role="tab" aria-selected="false">Клиенты</button>
            </div>
          </div>
          <div class="card-toolbar-right">
            <div class="search-box" id="search-box">
              <span class="search-box__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </span>
              <input
                type="search"
                id="user-search"
                class="search-box__input"
                placeholder="Поиск по телефону, имени, Telegram…"
                autocomplete="off"
                enterkeyhint="search"
              />
              <button type="button" class="search-box__clear" id="search-clear" aria-label="Очистить поиск" hidden>&times;</button>
            </div>
            <button type="button" class="btn btn-primary" id="create-user-btn">+ Создать сотрудника</button>
          </div>
        </div>
        <div id="users-table-wrap"></div>
        <div id="users-pagination" class="pagination-wrap"></div>
      </section>
    </main>

    <div class="modal-overlay" id="user-modal" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <h3 id="modal-title">Сотрудник</h3>
          <button type="button" class="modal-close" id="modal-close" aria-label="Закрыть">&times;</button>
        </div>
        <form id="user-form" class="modal-body">
          <input type="hidden" name="user_id" id="user-id" />
          <label class="field">
            <span>Телефон</span>
            <input type="text" name="phone" required placeholder="+998900000000" />
          </label>
          <label class="field">
            <span>Имя (необязательно)</span>
            <input type="text" name="display_name" placeholder="Иван" />
          </label>
          <div class="field">
            <span>Права</span>
            <div id="modal-rights" class="rights-grid"></div>
          </div>
          <p id="modal-error" class="message error" hidden></p>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="modal-cancel">Отмена</button>
            <button type="submit" class="btn btn-primary" id="modal-submit">Сохранить</button>
          </div>
        </form>
      </div>
    </div>

    <script src="admin-common.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
